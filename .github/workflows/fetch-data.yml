name: Fetch PandaScore Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch PandaScore data
        env:
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
        run: node scripts/fetch-pandascore.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/live.json
          git diff --cached --quiet || git commit -m "chore: update live data from PandaScore"
          git push
