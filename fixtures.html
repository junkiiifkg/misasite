<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Match Fixtures - MISA Esports</title>
  <meta name="description" content="MISA Esports match schedule and results. Upcoming fixtures and recent results across LoL, CS2, Valorant, EA FC 26, and MLBB."/>
  <meta property="og:title" content="Match Fixtures - MISA Esports"/>
  <meta property="og:description" content="Upcoming matches and recent results for all MISA Esports branches."/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="favicon.svg"/>
  <meta name="twitter:card" content="summary"/>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/shared.css"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-bright": "#393939", "surface-container-high": "#2a2a2a",
            "on-secondary-fixed": "#410000", "on-secondary": "#690000",
            "tertiary-container": "#cbaf7b", "surface": "#131313",
            "on-surface": "#e5e2e1", "inverse-primary": "#735c00",
            "primary-fixed": "#ffe088", "on-secondary-fixed-variant": "#930001",
            "on-tertiary-container": "#564218", "on-primary-fixed": "#241a00",
            "on-error": "#690005", "outline": "#99907c", "on-tertiary": "#3f2e05",
            "surface-container-lowest": "#0e0e0e", "on-primary": "#3c2f00",
            "background": "#131313", "tertiary-fixed-dim": "#e0c38d",
            "on-error-container": "#ffdad6", "primary-fixed-dim": "#e9c349",
            "inverse-on-surface": "#313030", "secondary": "#ffb4a8",
            "secondary-container": "#ff5541", "surface-variant": "#353534",
            "tertiary-fixed": "#fedfa7", "tertiary": "#e8ca94",
            "surface-dim": "#131313", "on-secondary-container": "#5c0000",
            "inverse-surface": "#e5e2e1", "primary": "#f2ca50",
            "on-surface-variant": "#d0c5af", "error-container": "#93000a",
            "on-primary-container": "#554300", "primary-container": "#d4af37",
            "surface-tint": "#e9c349", "surface-container-low": "#1c1b1b",
            "secondary-fixed-dim": "#ffb4a8", "on-primary-fixed-variant": "#574500",
            "surface-container-highest": "#353534", "surface-container": "#201f1f",
            "on-tertiary-fixed": "#261900", "secondary-fixed": "#ffdad4",
            "on-tertiary-fixed-variant": "#58441a", "outline-variant": "#4d4635",
            "error": "#ffb4ab", "on-background": "#e5e2e1"
          },
          fontFamily: { "headline": ["Space Grotesk"], "body": ["Work Sans"], "label": ["Work Sans"] },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
</head>
<body class="overflow-x-hidden">

<div id="nav-root"></div>

<main class="pt-28 pb-24 px-4 md:px-8 lg:px-12 max-w-[1400px] mx-auto min-h-screen">

  <!-- Page Header -->
  <section class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
    <div class="space-y-2">
      <span class="font-label text-primary tracking-[0.4em] text-xs uppercase block">Competitive Schedule</span>
      <h1 class="font-headline text-5xl md:text-7xl font-black uppercase tracking-tighter">Match Fixtures</h1>
    </div>
  </section>

  <!-- Game Filter Toggles -->
  <div id="game-filters" class="flex flex-wrap gap-3 mb-12"></div>

  <!-- Upcoming Matches -->
  <section class="space-y-8 mb-20">
    <div class="flex items-center gap-4">
      <h2 class="font-headline text-2xl font-bold uppercase tracking-tight">Upcoming Matches</h2>
      <div class="h-[2px] flex-1 bg-gradient-to-r from-outline-variant/30 to-transparent"></div>
    </div>
    <div id="upcoming-matches" class="grid gap-4">
      <!-- Populated by fixtures.js -->
    </div>
  </section>

  <!-- Recent Results -->
  <section class="space-y-8">
    <div class="flex items-center gap-4">
      <h2 class="font-headline text-2xl font-bold uppercase tracking-tight">Recent Results</h2>
      <div class="h-[2px] flex-1 bg-gradient-to-r from-outline-variant/30 to-transparent"></div>
    </div>
    <div id="recent-results" class="grid gap-2">
      <!-- Populated by fixtures.js -->
    </div>
  </section>

</main>

<div id="footer-root"></div>

<script defer src="assets/js/data.js"></script>
<script defer src="assets/js/data-loader.js"></script>
<script defer src="assets/js/shared.js"></script>
<script defer src="assets/js/fixtures.js"></script>

</body>
</html>
